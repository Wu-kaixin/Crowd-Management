# Stage 3 bottleneck scenario designed to make exit-splitting guidance visible.
seed: 17

room:
  width: 24.0
  height: 14.0
  exit:
    center: [23.5, 5.0]
    width: 1.15
    radius: 0.75
    id: main_exit
  alternative_exits:
    - center: [23.5, 11.0]
      width: 1.65
      radius: 0.75
      id: alternate_exit

simulation:
  dt: 0.05
  steps: 800
  pedestrian_count: 320
  pedestrian_radius: 0.13
  desired_speed_mean: 1.18
  desired_speed_std: 0.18
  max_speed: 2.0

crowd:
  initial_center: [5.0, 5.3]
  initial_spread: [1.6, 2.7]
  compliance_mean: 0.74
  compliance_std: 0.16

forces:
  goal_gain: 1.2
  repulsion_gain: 0.10
  repulsion_range: 0.44
  wall_gain: 0.18
  wall_range: 0.45
  damping: 0.15
  noise_std: 0.015

guiders:
  count: 8
  max_speed: 1.8
  influence_radius: 2.7
  influence_strength: 1.05
  rear_distance_scale: 1.25
  side_spacing: 1.3

metrics:
  congestion_radius: 0.58
  near_collision_distance: 0.35
  exit_pressure_radius: 3.2

outputs:
  save_every: 5
