# Prepared two-exit scenario for the next crowd-management sprint.
# The current simulator still uses the primary `room.exit` field; `alternative_exits`
# documents the intended second exit for future exit-choice guidance experiments.
seed: 11

room:
  width: 20.0
  height: 12.0
  exit:
    center: [19.5, 9.0]
    width: 1.8
    radius: 0.6
  alternative_exits:
    - center: [19.5, 3.0]
      width: 1.8
      radius: 0.6
      label: lower_right

simulation:
  dt: 0.05
  steps: 450
  pedestrian_count: 220
  pedestrian_radius: 0.12
  desired_speed_mean: 1.20
  desired_speed_std: 0.18
  max_speed: 2.0

crowd:
  initial_center: [4.0, 6.0]
  initial_spread: [1.2, 2.4]
  compliance_mean: 0.65
  compliance_std: 0.18

forces:
  goal_gain: 1.2
  repulsion_gain: 0.08
  repulsion_range: 0.45
  wall_gain: 0.15
  wall_range: 0.4
  damping: 0.15

guiders:
  count: 6
  max_speed: 1.5
  influence_radius: 2.3
  influence_strength: 0.85
  rear_distance_scale: 1.25
  side_spacing: 1.4

outputs:
  save_every: 5

notes:
  purpose: "Prepared scenario for future split-flow guidance tests. Current one-exit model uses room.exit as the primary exit."
