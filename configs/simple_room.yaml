# Simple microscopic crowd-management scenario.
# Coordinate frame: x in [0, room.width], y in [0, room.height].
# The exit is on the right wall.
seed: 7
steps: 360
dt: 0.05

room:
  width: 12.0
  height: 7.0
  exit_center_y: 3.5
  exit_width: 1.6
  exit_depth: 0.9

pedestrians:
  count: 160
  spawn_center: [2.0, 3.5]
  spawn_std: [0.75, 1.15]
  radius: 0.16
  desired_speed_mean: 1.25
  desired_speed_std: 0.15
  max_speed: 2.0
  compliance_mean: 0.65
  compliance_std: 0.15
  relaxation_time: 0.45
  interaction_range: 0.9
  repulsion_strength: 2.4
  repulsion_range: 0.28
  wall_repulsion_strength: 2.7
  wall_margin: 0.5
  noise_std: 0.05

# Guider = mobile guidance agent, not necessarily physical robot.
guiders:
  count: 4
  max_speed: 1.7
  influence_radius: 2.15
  guidance_strength: 1.05
  target_distance_gain: 1.25
  side_spacing: 1.15
  min_distance_from_exit: 1.0

metrics:
  congestion_radius: 0.55
  near_collision_distance: 0.34
